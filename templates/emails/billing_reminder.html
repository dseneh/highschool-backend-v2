<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing reminder - EzySchool</title>
  <style>
    body { margin: 0; padding: 24px 12px; background: #eef2f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: #1f2f46; }
    .card { max-width: 620px; margin: 0 auto; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .top { padding: 28px; border-bottom: 1px solid #eef1f4; text-align: center; background: linear-gradient(180deg, #f7f9fd 0%, #fff 100%); }
    .title { margin: 0; font-size: 22px; color: #0b2545; }
    .content { padding: 26px 28px; }
    p { margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #2a3f5f; }
    .btn { display: inline-block; margin: 8px 0 16px; padding: 12px 20px; background: #2563eb; color: #fff !important; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 15px; }
    .footer { padding: 16px 28px 24px; border-top: 1px solid #eef1f4; text-align: center; }
    .footer p { margin: 0; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      {% if logo_url %}<img src="{{ logo_url }}" alt="EzySchool" style="max-height:44px;margin-bottom:12px;" />{% endif %}
      <h1 class="title">{{ headline }}</h1>
    </div>
    <div class="content">
      <p>Hello,</p>
      <p>{{ body_text }}</p>
      <p><a class="btn" href="{{ billing_url }}">Open billing settings</a></p>
      <p>Questions? Email <a href="mailto:{{ support_email }}">{{ support_email }}</a>.</p>
    </div>
    <div class="footer">
      <p>EzySchool · {{ school_name }}</p>
    </div>
  </div>
</body>
</html>
