<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ subject }}</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.5; color: #1a1a1a;">
  {% if logo_url %}
  <p><img src="{{ logo_url }}" alt="{{ school_name }}" height="40" /></p>
  {% endif %}
  <h2 style="margin-bottom: 8px;">{{ subject }}</h2>
  <p>Hi {{ user_name }},</p>
  <p style="white-space: pre-wrap;">{{ body }}</p>
  {% if action_url %}
  <p><a href="{{ action_url }}" style="color: #4f46e5;">View in portal</a></p>
  {% endif %}
  <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 24px 0;" />
  <p style="font-size: 12px; color: #6b7280;">
    {{ school_name }} · Powered by {{ dev_name|default:"DewX IT Solutions" }}<br />
    Questions? {{ support_email }}
  </p>
</body>
</html>
